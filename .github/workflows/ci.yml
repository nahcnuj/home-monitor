name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Static collect-dns.ps1 checks
        shell: pwsh
        run: ./scripts/tests/Assert-CollectDnsSafe.ps1

  windows-collect:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Static collect-dns.ps1 checks
        shell: pwsh
        run: ./scripts/tests/Assert-CollectDnsSafe.ps1

      - name: Run production Start-DnsLookupJob (real nslookup)
        shell: pwsh
        run: ./scripts/tests/Test-CollectDnsLookup.ps1
