name: Sync DNS Data

on:
  workflow_dispatch:
    inputs:
      data_b64:
        description: Gzip+base64 encoded TSV delta
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          path: source

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Merge incoming TSV data
        env:
          DATA_B64: ${{ github.event.inputs.data_b64 }}
        run: |
          CONFIG_JSON=$(cd source && npm ci --silent && npx tsx scripts/read-config.ts)
          export CONFIG_JSON

          data_b64="${DATA_B64:-}"
          if [ -z "$data_b64" ]; then
            echo "data_updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "data_updated=true" >> $GITHUB_OUTPUT

          python3 << 'PYEOF'
          import os, base64, gzip, re, json, time

          IPV4 = re.compile(r"^(?:\d{1,3}\.){3}\d{1,3}$")
          IPV6 = re.compile(r"^[0-9a-fA-F:]+$")

          def is_dns_server_key(key: str) -> bool:
              if key == "unknown":
                  return True
              return bool(IPV4.match(key) or IPV6.match(key))

          def row_key(cols: list[str]) -> tuple[str, str, str]:
              domain = ""
              if len(cols) >= 4 and cols[2] and not cols[2].isdigit():
                  domain = cols[2]
              return (cols[0], cols[1], domain)

          master_cfg = json.loads(os.environ["CONFIG_JSON"])
          data_cutoff = int(master_cfg.get("data_cutoff_ts", 0))
          rolling_cutoff = int(time.time()) - 7 * 86400
          cutoff = max(rolling_cutoff, data_cutoff)

          data_b64 = os.environ.get("DATA_B64", "")
          if not data_b64:
              exit(0)

          incoming = gzip.decompress(base64.b64decode(data_b64)).decode("utf-8")
          incoming_lines = [l for l in incoming.strip().split("\n") if l.strip()]

          path = "pages/docs/data/dns-latency.tsv"
          existing_lines = []
          if os.path.exists(path):
              with open(path, encoding="utf-8") as f:
                  existing_lines = [l for l in f.read().strip().split("\n") if l.strip()]

          seen = set()
          merged = []
          for line in existing_lines + incoming_lines:
              cols = line.split("\t")
              if len(cols) < 2:
                  continue
              if not is_dns_server_key(cols[1]):
                  continue
              key = row_key(cols)
              if key in seen:
                  continue
              seen.add(key)
              merged.append(line)

          merged = sorted(
              [l for l in merged if int(l.split("\t")[0]) >= cutoff],
              key=lambda l: int(l.split("\t")[0]),
          )

          os.makedirs(os.path.dirname(path), exist_ok=True)
          with open(path, "w", encoding="utf-8") as f:
              if merged:
                  f.write("\n".join(merged) + "\n")
          PYEOF

      - name: Build dns-latency.json for the dashboard
        run: |
          TSV=pages/docs/data/dns-latency.tsv
          JSON=pages/docs/data/dns-latency.json
          if [[ -f "$TSV" ]]; then
            (cd source && npx tsx scripts/tsv-to-json.ts "../$TSV" "../$JSON")
          else
            mkdir -p pages/docs/data
            echo '[]' > "$JSON"
          fi

      - name: Commit and push gh-pages
        working-directory: pages
        id: commit-push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git merge origin/master --no-edit -m "merge master into gh-pages"

          if [[ -d docs/config ]]; then
            git rm -rf docs/config
          fi

          git add -f docs/data/dns-latency.tsv docs/data/dns-latency.json
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: update dns latency data"
          fi
          git push -f origin gh-pages

          echo "pushed=true" >> $GITHUB_OUTPUT

      - name: Trigger Pages deployment
        # GITHUB_TOKEN pushes do not trigger `push` events.
        # We explicitly dispatch to guarantee automatic deploy.
        if: steps.commit-push.outputs.pushed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'gh-pages'
            });

      - name: Trigger Pages deployment
        # Explicit dispatch ensures Deploy Pages runs even when the push
        # was performed with GITHUB_TOKEN (which does not trigger push events).
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'gh-pages'
            });
