name: Sync DNS Data

on:
  workflow_dispatch:
    inputs:
      data_b64:
        description: Gzip+base64 encoded TSV delta
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          path: source

      - uses: actions/checkout@v4
        with:
          ref: data
          path: data

      - name: Merge incoming TSV data
        env:
          DATA_B64: ${{ github.event.inputs.data_b64 }}
        run: |
          python3 << 'PYEOF'
          import os, base64, gzip, re, json, time

          IPV4 = re.compile(r"^(?:\d{1,3}\.){3}\d{1,3}$")
          IPV6 = re.compile(r"^[0-9a-fA-F:]+$")

          def is_dns_server_key(key: str) -> bool:
              if key == "unknown":
                  return True
              return bool(IPV4.match(key) or IPV6.match(key))

          def row_key(cols: list[str]) -> tuple[str, str, str]:
              domain = ""
              if len(cols) >= 4 and cols[2] and not cols[2].isdigit():
                  domain = cols[2]
              return (cols[0], cols[1], domain)

          with open("source/config/monitor.json", encoding="utf-8") as f:
              master_cfg = json.load(f)
          data_cutoff = int(master_cfg.get("data_cutoff_ts", 0))
          rolling_cutoff = int(time.time()) - 7 * 86400
          cutoff = max(rolling_cutoff, data_cutoff)

          dashboard_cfg = {
              "data_cutoff_ts": data_cutoff,
              "display_hours": int(master_cfg.get("display_hours", 24)),
          }
          os.makedirs("data/config", exist_ok=True)
          with open("data/config/monitor.json", "w", encoding="utf-8") as f:
              json.dump(dashboard_cfg, f, indent=2)
              f.write("\n")

          data_b64 = os.environ.get("DATA_B64", "")
          if not data_b64:
              exit(0)

          incoming = gzip.decompress(base64.b64decode(data_b64)).decode("utf-8")
          incoming_lines = [l for l in incoming.strip().split("\n") if l.strip()]

          path = "data/data/dns-latency.tsv"
          existing_lines = []
          if os.path.exists(path):
              with open(path, encoding="utf-8") as f:
                  existing_lines = [l for l in f.read().strip().split("\n") if l.strip()]

          seen = set()
          merged = []
          for line in existing_lines + incoming_lines:
              cols = line.split("\t")
              if len(cols) < 2:
                  continue
              if not is_dns_server_key(cols[1]):
                  continue
              key = row_key(cols)
              if key in seen:
                  continue
              seen.add(key)
              merged.append(line)

          merged = sorted(
              [l for l in merged if int(l.split("\t")[0]) >= cutoff],
              key=lambda l: int(l.split("\t")[0]),
          )

          os.makedirs(os.path.dirname(path), exist_ok=True)
          with open(path, "w", encoding="utf-8") as f:
              if merged:
                  f.write("\n".join(merged) + "\n")
          PYEOF

      - name: Commit and push data branch
        working-directory: data
        run: |
          if git diff --quiet; then
            echo "data_unchanged=true" >> "$GITHUB_OUTPUT"
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dns-latency.tsv config/monitor.json
          git commit -m "chore: update dns latency data"
          git push
        id: commit