name: Deploy Pages

on:
  push:
    branches: [master]
    paths:
      - "dashboard/**"
      - "docs/config/**"
      - "docs/data/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.ts"
      - "scripts/prepare-pages.sh"
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/sync-dns-data.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      - name: Build dashboard and assemble site
        run: bash scripts/prepare-pages.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

      - id: deployment
        uses: actions/deploy-pages@v4