name: Deploy Pages

on:
  # Human/manual runs and explicit dispatch from Sync (after a real push).
  workflow_dispatch:
  # master → gh-pages merge (GITHUB_TOKEN push does not fire `push` here).
  workflow_run:
    workflows: [Merge to gh-pages]
    types: [completed]
  # Rare non-bot pushes to gh-pages (local PAT etc.).
  push:
    branches: [gh-pages]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: gh-pages

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: bash scripts/prepare-pages.sh

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dashboard/dist

      - id: deployment
        uses: actions/deploy-pages@v5