name: Deploy Pages

on:
  push:
    branches: [master, data]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          path: source

      - uses: actions/checkout@v4
        with:
          ref: data
          path: pages-data

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Build dashboard and assemble site
        working-directory: source
        env:
          PAGES_DATA_DIR: ${{ github.workspace }}/pages-data
        run: |
          npm ci
          npm run typecheck
          npm run test
          bash scripts/prepare-pages.sh

      - name: Deploy to gh-pages branch
        working-directory: source/dashboard/dist
        run: |
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git branch -M gh-pages
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}