<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS Latency Monitor</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1645913691678081" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <div class="header-row">
      <div class="header-title">
        <h1>DNS Latency Monitor</h1>
        <p class="subtitle" id="subtitle">自宅回線の DNS 応答レイテンシ — DNS サーバー別</p>
      </div>
      <div class="range-selector" id="rangeSelector" role="group" aria-label="表示範囲"></div>
    </div>
  </header>

  <main>
    <p class="last-updated is-loading" id="lastUpdated" role="status" aria-live="polite">読み込み中...</p>

    <div class="charts">
      <section class="chart-section chart-section--latency" aria-labelledby="latency-heading">
        <div class="section-heading section-heading--latency">
          <h2 id="latency-heading">レイテンシ推移</h2>
          <div class="latency-legend" id="latencyLegend" hidden aria-label="DNS サーバー凡例"></div>
        </div>
        <div class="chart-container chart-container--latency" id="latencyChartContainer">
          <div class="chart-plot-frame">
            <canvas id="latencyChart" role="img" aria-label="DNS レイテンシ推移グラフ"></canvas>
          </div>
          <!-- Wide spacer drives native scrollbar; chart X domain pans with scroll (no huge canvas). -->
          <div class="chart-hscroll" id="latencyChartScroll" hidden aria-label="表示期間のスクロール">
            <div class="chart-hscroll-inner" id="latencyChartInner"></div>
          </div>
        </div>
        <div class="stats-bar" id="statsGrid" aria-label="レイテンシ統計"></div>
      </section>

      <section class="chart-section chart-section--error" aria-labelledby="error-heading">
        <div class="section-heading">
          <h2 id="error-heading">エラー種別内訳</h2>
          <p class="uptime-badge" id="uptimeBadge" aria-label="Uptime"></p>
        </div>
        <div class="chart-container chart-container--short">
          <canvas id="errorChart" role="img" aria-label="エラー種別の内訳"></canvas>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>

<!-- Google tag (gtag.js) -->

  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-RMH8Q8RB96');
</script>
</body>
</html>
