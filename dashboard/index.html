<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS Latency Monitor</title>
</head>
<body>
  <header>
    <div class="header-row">
      <div class="header-title">
        <h1>DNS Latency Monitor</h1>
        <p class="subtitle" id="subtitle">自宅回線の DNS 応答レイテンシ — DNS サーバー別</p>
      </div>
      <div class="range-selector" id="rangeSelector" role="group" aria-label="表示範囲"></div>
    </div>
  </header>

  <main>
    <p class="last-updated" id="lastUpdated">読み込み中...</p>
    <section class="stats-grid" id="statsGrid"></section>

    <div class="charts">
      <section class="chart-section chart-section--latency">
        <h2>レイテンシ推移 <span class="chart-hint">線=平均 / バイオリン=分布</span></h2>
        <div class="chart-container">
          <canvas id="latencyChart"></canvas>
        </div>
      </section>

      <section class="chart-section chart-section--error">
        <h2>エラー種別内訳</h2>
        <div class="chart-container chart-container--short">
          <canvas id="errorChart"></canvas>
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
